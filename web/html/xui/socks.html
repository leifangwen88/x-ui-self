<!DOCTYPE html>
<html lang="en">
{{template "head" .}}
<style>
    @media (min-width: 769px) {
        .ant-layout-content {
            margin: 24px 16px;
        }
    }
    .import-area {
        font-family: Consolas, monospace;
    }
    .socks-table-scroll {
        max-height: calc(100vh - 420px);
        min-height: 320px;
        overflow: auto;
    }
    .socks-filter-bar {
        margin-bottom: 12px;
    }
    .socks-filter-bar .ant-form-item {
        margin-bottom: 8px;
    }

    .socks-inbound-bind {
        min-width: 200px;
    }
</style>
<body>
<a-layout id="app" v-cloak>
    {{ template "commonSider" . }}
    <a-layout id="content-layout">
        <a-layout-content>
            <a-spin :spinning="spinning" :delay="300" tip="loading">
                <a-card title="批量录入 SOCKS5" style="margin-bottom: 16px;">
                    <p style="color:#666;margin-bottom:8px;">每行一条，格式：<code>服务器:端口:账号:密码</code></p>
                    <a-textarea class="import-area" v-model="importText" :rows="6"
                                placeholder="104.165.79.83:7243:user:pass"></a-textarea>
                    <a-form layout="inline" style="margin-top: 12px;">
                        <a-form-item label="本批到期时间">
                            <a-date-picker :show-time="{ format: 'HH:mm' }" format="YYYY-MM-DD HH:mm"
                                           v-model="importExpiryTime" :locale="datePickerLocale"
                                           allow-clear placeholder="清空表示永不到期"
                                           style="width: 220px;"></a-date-picker>
                        </a-form-item>
                        <a-form-item>
                            <a-button type="primary" @click="importSocks" :loading="importing">批量导入</a-button>
                        </a-form-item>
                    </a-form>
                    <a-alert v-if="importResult" style="margin-top:12px;" type="info" show-icon>
                        <template slot="message">
                            成功 [[ importResult.imported ]] 条，跳过重复 [[ importResult.skipped ]] 条
                            <div v-if="importResult.errors && importResult.errors.length" style="margin-top:8px;">
                                <div v-for="(e,i) in importResult.errors" :key="i">[[ e ]]</div>
                            </div>
                        </template>
                    </a-alert>
                </a-card>

                <a-card title="SOCKS5 列表">
                    <template slot="extra">
                        <a-button style="margin-right: 8px;" @click="syncFromTemplate" :loading="syncing">同步模板绑定</a-button>
                        <a-button type="danger" :disabled="selectedRowKeys.length === 0" @click="deleteSelected">
                            删除选中 ([[ selectedRowKeys.length ]])
                        </a-button>
                    </template>
                    <div class="socks-filter-bar">
                        <a-form layout="inline">
                            <a-form-item label="绑定状态">
                                <a-select v-model="filterBind" style="width: 120px;">
                                    <a-select-option value="all">全部</a-select-option>
                                    <a-select-option value="bound">已绑定</a-select-option>
                                    <a-select-option value="unbound">未绑定</a-select-option>
                                </a-select>
                            </a-form-item>
                            <a-form-item label="到期状态">
                                <a-select v-model="filterExpiry" style="width: 120px;">
                                    <a-select-option value="all">全部</a-select-option>
                                    <a-select-option value="valid">未到期</a-select-option>
                                    <a-select-option value="expired">已到期</a-select-option>
                                    <a-select-option value="unlimited">无期限</a-select-option>
                                </a-select>
                            </a-form-item>
                            <a-form-item label="排序">
                                <a-select v-model="sortBy" style="width: 140px;">
                                    <a-select-option value="createdDesc">入库时间↓</a-select-option>
                                    <a-select-option value="createdAsc">入库时间↑</a-select-option>
                                    <a-select-option value="expiryDesc">到期时间↓</a-select-option>
                                    <a-select-option value="expiryAsc">到期时间↑</a-select-option>
                                </a-select>
                            </a-form-item>
                            <a-form-item label="每页条数">
                                <a-select v-model="pageSize" style="width: 90px;" @change="onPageSizeChange">
                                    <a-select-option :value="20">20</a-select-option>
                                    <a-select-option :value="50">50</a-select-option>
                                    <a-select-option :value="100">100</a-select-option>
                                    <a-select-option :value="200">200</a-select-option>
                                </a-select>
                            </a-form-item>
                        </a-form>
                    </div>
                    <div class="socks-table-scroll">
                        <a-table :columns="columns" :data-source="pagedSocksList" :row-key="r => r.id"
                                 :pagination="false" :loading="spinning"
                                 :row-selection="{ selectedRowKeys: selectedRowKeys, onChange: onSelectChange }">
                            <template slot="endpoint" slot-scope="text, record">
                                <a-tag color="blue">[[ record.address ]]:[[ record.port ]]</a-tag>
                            </template>
                            <template slot="auth" slot-scope="text, record">
                                [[ record.username ]] / ****
                            </template>
                            <template slot="createdAt" slot-scope="text, record">
                                <span v-if="record.createdAt > 0">[[ formatTime(record.createdAt) ]]</span>
                                <span v-else style="color:#999;">-</span>
                            </template>
                            <template slot="remark" slot-scope="text, record">
                                <a-input size="small" v-model="record.remark" placeholder="手动备注"
                                         style="min-width: 120px;"
                                         @blur="() => saveRemark(record)"
                                         @pressEnter="() => saveRemark(record)"></a-input>
                            </template>
                            <template slot="expiryTime" slot-scope="text, record">
                                <a-tag v-if="record.expiryTime <= 0" color="green">无期限</a-tag>
                                <a-tag v-else-if="isExpired(record)" color="red">[[ formatTime(record.expiryTime) ]]</a-tag>
                                <a-tag v-else color="blue">[[ formatTime(record.expiryTime) ]]</a-tag>
                            </template>
                            <template slot="gameMark" slot-scope="text, record">
                                <a-dropdown :trigger="['click']">
                                    <a @click="e => e.preventDefault()">
                                        <a-tag v-for="t in usedGameTags(record)" :key="'u'+t" color="blue" style="margin:2px;">[[ t ]]·用过</a-tag>
                                        <a-tag v-for="t in bannedGameTags(record)" :key="'b'+t" color="red" style="margin:2px;">[[ t ]]·封禁</a-tag>
                                        <span v-if="!usedGameTags(record).length && !bannedGameTags(record).length"
                                              style="color:#999;">设置标记</span>
                                    </a>
                                    <a-menu slot="overlay" @click="a => onGameMarkMenu(a, record)">
                                        <template v-for="g in games">
                                            <a-menu-item :key="g.id + ':used'">[[ g.name ]] → 标记「用过」</a-menu-item>
                                            <a-menu-item :key="g.id + ':banned'">[[ g.name ]] → 标记「封禁过」</a-menu-item>
                                            <a-menu-item v-if="isGameBanned(record.id, g.id) || isGameUsed(record.id, g.id)"
                                                         :key="g.id + ':clear'">[[ g.name ]] → 清除标记</a-menu-item>
                                        </template>
                                    </a-menu>
                                </a-dropdown>
                            </template>
                            <template slot="inbound" slot-scope="text, record">
                                <a-select class="socks-inbound-bind"
                                          :value="boundInboundId(record)"
                                          placeholder="选择入站绑定"
                                          allow-clear
                                          show-search
                                          :filter-option="filterInboundOption"
                                          @change="val => onInboundBindChange(record, val)">
                                    <a-select-option :value="0">不绑定入站</a-select-option>
                                    <a-select-option v-for="ib in selectableInbounds(record.id)" :key="ib.id" :value="ib.id">
                                        [[ inboundOptionLabel(ib) ]]
                                    </a-select-option>
                                </a-select>
                            </template>
                        </a-table>
                    </div>
                    <div style="margin-top: 12px; text-align: right;">
                        <a-pagination :current="page" :page-size="pageSize" :total="filteredSocksList.length"
                                      :show-total="total => `共 ${total} 条`"
                                      show-size-changer :page-size-options="['20','50','100','200']"
                                      @change="onPageChange" @showSizeChange="onPageSizeChange"/>
                    </div>
                </a-card>
            </a-spin>
        </a-layout-content>
    </a-layout>
</a-layout>
{{template "js" .}}
<script>
    const columns = [{
        title: 'ID',
        dataIndex: 'id',
        width: 60,
    }, {
        title: '地址',
        scopedSlots: { customRender: 'endpoint' },
        width: 180,
    }, {
        title: '账号',
        scopedSlots: { customRender: 'auth' },
        width: 140,
    }, {
        title: '入库时间',
        scopedSlots: { customRender: 'createdAt' },
        width: 150,
    }, {
        title: '备注',
        scopedSlots: { customRender: 'remark' },
        width: 160,
    }, {
        title: '到期时间',
        scopedSlots: { customRender: 'expiryTime' },
        width: 150,
    }, {
        title: '绑定的入站',
        scopedSlots: { customRender: 'inbound' },
        width: 240,
    }, {
        title: '游戏标记',
        scopedSlots: { customRender: 'gameMark' },
        width: 220,
    }];

    const app = new Vue({
        delimiters: ['[[', ']]'],
        el: '#app',
        data: {
            siderDrawer,
            spinning: false,
            importing: false,
            syncing: false,
            importText: '',
            importExpiryTime: SocksUtil.defaultImportExpiry(),
            datePickerLocale: typeof datePickerLocale !== 'undefined' ? datePickerLocale : {},
            importResult: null,
            socksList: [],
            remarkCache: {},
            selectedRowKeys: [],
            inboundMap: {},
            games: [],
            gameStatusMap: {},
            allInbounds: [],
            allInbounds: [],
            filterBind: 'all',
            filterExpiry: 'all',
            sortBy: 'createdDesc',
            page: 1,
            pageSize: 50,
        },
        computed: {
            filteredSocksList() {
                let list = this.socksList.slice();
                if (this.filterBind === 'bound') {
                    list = list.filter(s => this.inboundMap[s.id] && this.inboundMap[s.id].length);
                } else if (this.filterBind === 'unbound') {
                    list = list.filter(s => !this.inboundMap[s.id] || !this.inboundMap[s.id].length);
                }
                if (this.filterExpiry === 'valid') {
                    list = list.filter(s => s.expiryTime > 0 && !this.isExpired(s));
                } else if (this.filterExpiry === 'expired') {
                    list = list.filter(s => this.isExpired(s));
                } else if (this.filterExpiry === 'unlimited') {
                    list = list.filter(s => !s.expiryTime || s.expiryTime <= 0);
                }
                list.sort((a, b) => {
                    switch (this.sortBy) {
                        case 'createdAsc': return (a.createdAt || 0) - (b.createdAt || 0);
                        case 'expiryDesc': return (b.expiryTime || 0) - (a.expiryTime || 0);
                        case 'expiryAsc': return (a.expiryTime || 0) - (b.expiryTime || 0);
                        default: return (b.createdAt || 0) - (a.createdAt || 0);
                    }
                });
                return list;
            },
            pagedSocksList() {
                const start = (this.page - 1) * this.pageSize;
                return this.filteredSocksList.slice(start, start + this.pageSize);
            },
        },
        methods: {
            formatTime(ms) {
                return DateUtil.formatMillis(ms);
            },
            isExpired(record) {
                return record.expiryTime > 0 && record.expiryTime < Date.now();
            },
            loading(v = true) {
                this.spinning = v;
            },
            onSelectChange(keys) {
                this.selectedRowKeys = keys;
            },
            onPageChange(page) {
                this.page = page;
            },
            onPageSizeChange(current, size) {
                this.pageSize = size;
                this.page = 1;
            },
            buildInboundMap(inbounds) {
                const map = {};
                for (const ib of inbounds) {
                    if (!ib.socksProxyId) continue;
                    if (!map[ib.socksProxyId]) map[ib.socksProxyId] = [];
                    map[ib.socksProxyId].push(ib);
                }
                this.inboundMap = map;
            },
            buildGameStatusMap(statuses) {
                const map = {};
                for (const st of (statuses || [])) {
                    if (!map[st.socksProxyId]) map[st.socksProxyId] = {};
                    map[st.socksProxyId][st.gameId] = st;
                }
                this.gameStatusMap = map;
            },
            isGameBanned(socksId, gameId) {
                const m = this.gameStatusMap[socksId];
                return m && m[gameId] && m[gameId].status === 'banned';
            },
            isGameUsed(socksId, gameId) {
                const m = this.gameStatusMap[socksId];
                if (!m || !m[gameId] || m[gameId].status === 'banned') {
                    return false;
                }
                const st = m[gameId];
                return st.useCount > 0 || st.status === 'used';
            },
            usedGameTags(record) {
                const tags = [];
                for (const g of this.games) {
                    if (this.isGameUsed(record.id, g.id)) {
                        tags.push(g.name);
                    }
                }
                return tags;
            },
            bannedGameTags(record) {
                const tags = [];
                for (const g of this.games) {
                    if (this.isGameBanned(record.id, g.id)) {
                        tags.push(g.name);
                    }
                }
                return tags;
            },
            async onGameMarkMenu(action, record) {
                const key = action.key;
                if (!key || key.indexOf(':') < 0) {
                    return;
                }
                const parts = key.split(':');
                const gameId = parseInt(parts[0], 10);
                const op = parts[1];
                if (op === 'used') {
                    await this.setGameMark(record.id, gameId, 'used');
                } else if (op === 'banned') {
                    await this.setGameMark(record.id, gameId, 'banned');
                } else if (op === 'clear') {
                    await this.setGameMark(record.id, gameId, 'clear');
                }
            },
            async setGameMark(socksId, gameId, mark) {
                const msg = await HttpUtil.post('/xui/socks/setGameMark', {
                    socksProxyId: socksId,
                    gameId: gameId,
                    mark: mark,
                });
                if (msg.success) {
                    this.$message.success('标记已保存');
                    await this.loadGameStatuses();
                }
            },
            async loadGameStatuses() {
                const msg = await HttpUtil.post('/xui/socks/gameStatuses');
                if (msg.success) {
                    this.buildGameStatusMap(msg.obj);
                }
            },
            async loadAll() {
                this.loading(true);
                const [socksMsg, inboundMsg, gameMsg, statusMsg] = await Promise.all([
                    HttpUtil.post('/xui/socks/list'),
                    HttpUtil.post('/xui/inbound/list'),
                    HttpUtil.post('/xui/game/list'),
                    HttpUtil.post('/xui/socks/gameStatuses'),
                ]);
                this.loading(false);
                if (socksMsg.success) {
                    this.socksList = socksMsg.obj || [];
                    const cache = {};
                    for (const s of this.socksList) {
                        cache[s.id] = s.remark || '';
                    }
                    this.remarkCache = cache;
                }
                if (gameMsg.success) {
                    this.games = gameMsg.obj || [];
                }
                if (statusMsg.success) {
                    this.buildGameStatusMap(statusMsg.obj);
                }
                if (inboundMsg.success) {
                    this.allInbounds = inboundMsg.obj || [];
                    this.buildInboundMap(this.allInbounds);
                }
                this.page = 1;
            },
            async importSocks() {
                if (!this.importText.trim()) {
                    return;
                }
                let expiryTime = 0;
                if (this.importExpiryTime) {
                    expiryTime = this.importExpiryTime.valueOf();
                }
                this.importing = true;
                const msg = await HttpUtil.post('/xui/socks/import', {
                    text: this.importText,
                    expiryTime: expiryTime,
                });
                this.importing = false;
                if (msg.success) {
                    this.importResult = msg.obj;
                    this.importText = '';
                    this.importExpiryTime = SocksUtil.defaultImportExpiry();
                    await this.loadAll();
                }
            },
            async syncFromTemplate() {
                this.syncing = true;
                const msg = await HttpUtil.post('/xui/socks/syncTemplate');
                this.syncing = false;
                if (msg.success) {
                    const r = msg.obj;
                    Vue.prototype.$message.success(
                        `同步完成：新建 SOCKS ${r.socksCreated}，匹配 ${r.socksMatched}，绑定入站 ${r.inboundBound}，跳过 ${r.inboundSkipped}`
                    );
                    await this.loadAll();
                }
            },
            boundInboundId(socks) {
                const list = this.inboundMap[socks.id];
                if (!list || !list.length) {
                    return 0;
                }
                return list[0].id;
            },
            selectableInbounds(socksId) {
                let list = SocksUtil.filterSelectableInbounds(this.allInbounds, socksId);
                return list.filter(ib => {
                    if (!ib.gameId) {
                        return true;
                    }
                    if (ib.socksProxyId === socksId) {
                        return true;
                    }
                    return !this.isGameBanned(socksId, ib.gameId);
                });
            },
            inboundOptionLabel(ib) {
                return SocksUtil.formatInboundOptionLabel(ib);
            },
            filterInboundOption(input, option) {
                const text = (option.componentOptions && option.componentOptions.children
                    && option.componentOptions.children[0]
                    && option.componentOptions.children[0].text) || '';
                return text.toLowerCase().indexOf((input || '').toLowerCase()) >= 0;
            },
            async setInboundSocks(inboundId, socksProxyId) {
                return HttpUtil.post(`/xui/inbound/updateSocks/${inboundId}`, { socksProxyId: socksProxyId });
            },
            async onInboundBindChange(socks, val) {
                const inboundId = val == null ? 0 : val;
                const currentId = this.boundInboundId(socks);
                if (inboundId === currentId) {
                    return;
                }
                if (inboundId === 0) {
                    if (currentId > 0) {
                        const msg = await this.setInboundSocks(currentId, 0);
                        if (msg.success) {
                            this.$message.success('已解除入站绑定');
                            await this.loadAll();
                        }
                    }
                    return;
                }
                const boundList = this.inboundMap[socks.id] || [];
                for (const ib of boundList) {
                    if (ib.id !== inboundId) {
                        await this.setInboundSocks(ib.id, 0);
                    }
                }
                const target = this.allInbounds.find(ib => ib.id === inboundId);
                if (target && target.socksProxyId > 0 && target.socksProxyId !== socks.id) {
                    await this.setInboundSocks(inboundId, 0);
                }
                const msg = await this.setInboundSocks(inboundId, socks.id);
                if (msg.success) {
                    this.$message.success('入站绑定已更新');
                    await this.loadAll();
                }
            },
            async saveRemark(record) {
                const remark = (record.remark || '').trim();
                const prev = this.remarkCache[record.id] || '';
                if (remark === prev) {
                    return;
                }
                const msg = await HttpUtil.post('/xui/socks/updateRemark', {
                    id: record.id,
                    remark: remark,
                });
                if (msg.success) {
                    this.remarkCache[record.id] = remark;
                    record.remark = remark;
                    this.$message.success('备注已保存');
                } else {
                    record.remark = prev;
                }
            },
            deleteSelected() {
                this.$confirm({
                    title: '删除 SOCKS5',
                    content: `确定删除选中的 ${this.selectedRowKeys.length} 条？已绑定的入站将自动解绑。`,
                    okText: '删除',
                    okType: 'danger',
                    cancelText: '取消',
                    onOk: async () => {
                        const msg = await HttpUtil.post('/xui/socks/del', { ids: this.selectedRowKeys });
                        if (msg.success) {
                            this.selectedRowKeys = [];
                            await this.loadAll();
                        }
                    },
                });
            },
        },
        watch: {
            filterBind() { this.page = 1; },
            filterExpiry() { this.page = 1; },
            sortBy() { this.page = 1; },
        },
        mounted() {
            this.loadAll();
        },
    });
</script>
</body>
</html>
